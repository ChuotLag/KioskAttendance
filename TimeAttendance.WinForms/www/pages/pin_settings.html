<div class="max-w-3xl mx-auto">
  <div class="flex items-start justify-between gap-4">
    <div>
      <h3 class="text-xl font-bold">Đổi mã PIN quản lý</h3>
      <p class="text-sm text-[#4c939a] mt-1">
        Dashboard và Chấm công QR không cần PIN. Tất cả mục còn lại sẽ yêu cầu PIN trước khi vào.
      </p>
    </div>
  </div>

  <div class="mt-6 grid gap-6">
    <div class="p-6 rounded-2xl border border-[#cfe5e7] bg-white">
      <div class="flex items-center gap-2 mb-4">
        <span class="material-symbols-outlined text-[#4c939a]">key</span>
        <h4 class="font-bold">Đổi PIN</h4>
      </div>

     <!-- <div id="pin-status" class="mb-4 hidden"></div>-->

      <div class="grid gap-4">
        <div>
          <label class="block text-sm font-semibold mb-1">PIN hiện tại</label>
          <input id="pin-current" type="password" autocomplete="current-password"
                 class="w-full px-4 py-3 rounded-xl border border-[#cfe5e7] focus:outline-none focus:ring-2 focus:ring-primary/30" placeholder="Nhập PIN hiện tại" />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold mb-1">PIN mới</label>
            <input id="pin-new" type="password" autocomplete="new-password"
                   class="w-full px-4 py-3 rounded-xl border border-[#cfe5e7] focus:outline-none focus:ring-2 focus:ring-primary/30" placeholder="VD: 123456" />
          </div>
          <div>
            <label class="block text-sm font-semibold mb-1">Nhập lại PIN mới</label>
            <input id="pin-confirm" type="password" autocomplete="new-password"
                   class="w-full px-4 py-3 rounded-xl border border-[#cfe5e7] focus:outline-none focus:ring-2 focus:ring-primary/30" placeholder="Nhập lại PIN mới" />
          </div>
        </div>

        <div class="flex flex-wrap gap-3">
          <button id="btn-change-pin" type="button"
                  class="h-11 px-5 rounded-xl bg-primary text-[#0d1a1b] font-bold text-sm transition-transform active:scale-95">
            Đổi PIN
          </button>

          <button id="btn-reset-default" type="button"
                  class="h-11 px-5 rounded-xl border border-[#cfe5e7] bg-white font-semibold text-sm hover:bg-[#f5fbfc]">
            Reset về PIN mặc định
          </button>
        </div>
