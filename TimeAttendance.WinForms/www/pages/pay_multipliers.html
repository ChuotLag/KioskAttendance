    <div class="wrap">
        <div class="top">
            <div>
                <div class="title">Hệ số lương theo ngày</div>
                <div class="sub">Chọn ngày trên lịch để đặt hệ số (ví dụ 2.00 nhân đôi lương). Dữ liệu lưu trong DB.</div>
            </div>
            <div class="row">
                <button id="btnToday" class="btn ghost">Về hôm nay</button>
                <button id="btnReload" class="btn">Tải lại</button>
            </div>
        </div>

        <div class="grid">
            <!-- Calendar -->
            <div class="card">
                <div class="monthbar">
                    <div class="row">
                        <button id="btnPrev" class="btn">◀</button>
                        <div>
                            <div id="monthName" class="monthname">—</div>
                            <div class="legend">Ngày có hệ số sẽ được tô màu</div>
                        </div>
                        <button id="btnNext" class="btn">▶</button>
                    </div>
                    <div class="row">
                        <span class="pill">HS: <span id="pillMul">—</span></span>
                        <span class="pill">Ngày: <span id="pillDate">—</span></span>
                    </div>
                </div>

                <div class="cal" id="calGrid">
                    <!-- header + days -->
                </div>
            </div>

            <!-- Editor + List -->
            <div class="card">
                <div class="row" style="justify-content:space-between;">
                    <div>
                        <div style="font-weight:900;">Thiết lập hệ số</div>
                        <div class="sub">Chọn ngày trên lịch hoặc chọn bằng input bên dưới</div>
                    </div>
                    <button id="btnClear" class="btn ghost">Xóa chọn</button>
                </div>

                <div class="form" style="margin-top:10px;">
                    <div>
                        <label>Ngày</label>
                        <input id="mulDate" type="date" />
                    </div>

                    <div class="row">
                        <div style="flex:1; min-width:160px;">
                            <label>Hệ số</label>
                            <select id="mulValue">
                                <option value="1">1.00</option>
                                <option value="1.5">1.50</option>
                                <option value="2" selected>2.00</option>
                                <option value="3">3.00</option>
                            </select>
                        </div>
                        <div style="flex:1; min-width:220px;">
                            <label>Ghi chú</label>
                            <input id="mulNote" type="text" placeholder="VD: Lễ / Event..." />
                        </div>
                    </div>

                    <div class="row" style="justify-content:flex-end;">
                        <button id="btnDelete" class="btn danger" disabled>Xóa ngày này</button>
                        <button id="btnSave" class="btn primary" disabled>Lưu</button>
                    </div>

                    <div id="status" class="status"></div>
                </div>

                <div style="margin-top:14px;">
                    <div class="row" style="justify-content:space-between;">
                        <div style="font-weight:900;">Các ngày đã đặt trong tháng</div>
                        <div class="sub" id="listHint">—</div>
                    </div>

                    <div style="margin-top:8px; overflow:auto; max-height: 360px;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Ngày</th>
                                    <th>Hệ số</th>
                                    <th>Ghi chú</th>
                                    <th style="text-align:right;">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="tblBody">
                                <tr><td colspan="4" class="sub" style="padding:12px 8px;">Chưa có dữ liệu.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

</div>
